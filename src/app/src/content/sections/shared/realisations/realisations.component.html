<section class="realisations-section" aria-labelledby="realisations-list-title">
  <ul
    id="realisations-list"
    class="realisations-grid"
    [attr.aria-label]="'realisations.list.aria-label' | translate"
  >
    <li class="realisations-map-item fade-in" aria-label="Mapa lokalizacji realizacji w Polsce">
      <div class="realisations-map">
        @for (marker of mapMarkers(); track marker.id) {
          <button
            type="button"
            class="realisations-map-marker"
            [style.left.%]="marker.mapX"
            [style.bottom.%]="marker.mapY"
            [attr.aria-label]="marker.title + ' - ' + marker.region"
            [attr.title]="marker.title"
            (click)="openDetails(marker.slug)"
          >
            <span class="realisations-map-marker-dot"></span>
            <span class="realisations-map-marker-label">{{ marker.location }}</span>
          </button>
        }
      </div>
    </li>

    @for (card of cards(); track card.id) {
      <li class="realisations-item fade-in">
        <article class="realisations-card" aria-label="{{ card.translation.title }}">
          <div class="realisations-card-thumb">
            <img
              [ngSrc]="assetUrl(card.directory, card.cover)"
              [alt]="card.translation.title"
              loading="lazy"
              width="800"
              height="450"
              decoding="async"
            />
          </div>
          <div class="realisations-card-content">
            <h3>{{ card.translation.title }}</h3>
            <p class="realisations-card-meta">
              <span class="realisations-card-icon" aria-hidden="true"></span>
              <span>{{ card.region }}</span>
              <span class="realisations-card-separator">|</span>
              <span>{{ card.years }}</span>
            </p>
            <div class="realisations-card-footer">
              <button type="button" class="realisations-card-cta" (click)="openDetails(card.slug)">
                {{ 'realisations.list.cta' | translate }}
              </button>
            </div>
          </div>
        </article>
      </li>
    }
  </ul>
</section>
