<nav class="realisations-details__phases" aria-label="Fazy rekultywacji">
  <ol>
    @for (phase of phases(); track phase.number) {
      <li
        class="realisations-details__phase"
        [class.realisations-details__phase--active]="activePhase() === phase.number"
      >
        <button
          type="button"
          class="realisations-details__phase-btn"
          (click)="selectPhase(phase.number)"
          [attr.aria-current]="activePhase() === phase.number ? 'step' : null"
        >
          <div class="realisations-details__phase-circle">{{ phase.number }}</div>
          <div class="realisations-details__phase-content">
            <svg
              class="realisations-details__phase-icon"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              @switch (phase.icon) {
                @case ('truck') {
                  <rect x="2" y="7" width="14" height="8" rx="1" fill="currentColor" />
                  <rect x="16" y="9" width="6" height="6" rx="1" fill="currentColor" />
                  <circle cx="7" cy="18" r="2" fill="currentColor" />
                  <circle cx="19" cy="18" r="2" fill="currentColor" />
                }
                @case ('layers') {
                  <rect x="3" y="5" width="18" height="3" rx="1" fill="currentColor" />
                  <rect x="6" y="10" width="12" height="3" rx="1" fill="currentColor" />
                  <rect x="9" y="15" width="6" height="3" rx="1" fill="currentColor" />
                }
                @case ('shield') {
                  <path d="M12 2L4 5v6c0 5 4 9 8 11 4-2 8-6 8-11V5l-8-3z" fill="currentColor" />
                }
                @case ('sprout') {
                  <path d="M12 2s4 4 4 7-4 6-4 6-4-3-4-6 4-7 4-7z" fill="currentColor" />
                  <circle cx="12" cy="20" r="2" fill="currentColor" />
                }
                @case ('flag') {
                  <path
                    d="M6 3v18"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path d="M6 7c4-2 6 2 10 0v10c-4 2-6-2-10 0" fill="currentColor" />
                }
              }
            </svg>
            <span class="realisations-details__phase-name">{{ phase.translation.name }}</span>
          </div>
        </button>
      </li>
    }
  </ol>
</nav>
