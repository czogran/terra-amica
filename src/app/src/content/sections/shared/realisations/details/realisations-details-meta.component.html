<div
  class="realisations-details__meta"
  [attr.aria-label]="'realisations.details.meta.aria' | translate"
>
  <div>
    <span class="realisations-details__meta-icon" aria-hidden="true">
      <i class="bi bi-geo-alt"></i>
    </span>
    <span>
      <span class="realisations-details__label">{{
        'realisations.details.meta.region' | translate
      }}</span>
      <strong class="realisations-details__value">{{ region() }}</strong>
    </span>
  </div>
  <div>
    <span class="realisations-details__meta-icon" aria-hidden="true">
      <i class="bi bi-calendar3"></i>
    </span>
    <span>
      <span class="realisations-details__label">{{
        'realisations.details.meta.years' | translate
      }}</span>
      <strong class="realisations-details__value">{{ years() }}</strong>
    </span>
  </div>
  <div>
    <span class="realisations-details__meta-icon" aria-hidden="true">
      <i class="bi bi-flower2"></i>
    </span>
    <span>
      <span class="realisations-details__label">{{
        'realisations.details.meta.area' | translate
      }}</span>
      <strong class="realisations-details__value">{{ area() }}</strong>
    </span>
  </div>
</div>
