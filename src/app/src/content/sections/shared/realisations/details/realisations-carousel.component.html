<div
  class="realisations-details__carousel-shell"
  [class.realisations-details__carousel-shell--fullscreen]="isFullscreenOpen()"
  [class.realisations-details__carousel-shell--minimising]="isFullscreenMinimising()"
>
  <div
    #carouselEl
    [id]="carouselId"
    class="carousel slide"
    [attr.data-bs-ride]="isActive() ? 'carousel' : null"
    [attr.data-bs-interval]="isActive() ? '3000' : null"
    data-bs-pause="hover"
  >
    @if (images().length > 1) {
      <ol class="carousel-indicators">
        @for (image of images(); track image; let i = $index) {
          <li
            [attr.data-target]="'#' + carouselId"
            [attr.data-bs-target]="'#' + carouselId"
            [class.active]="i === activeIndex()"
            [attr.aria-current]="i === activeIndex() ? 'true' : null"
            [attr.aria-label]="'Slide ' + (i + 1)"
          ></li>
        }
      </ol>
    }

    <div class="carousel-inner h-100">
      @for (image of images(); track image; let i = $index) {
        <div class="carousel-item h-100" [class.active]="i === activeIndex()">
          <img
            [ngSrc]="image"
            [alt]="alt()"
            width="1600"
            height="900"
            [priority]="i === 0"
            class="d-block w-100 realisations-details__carousel-image"
          />
        </div>
      }
    </div>

    <button
      #fullscreenCloseButton
      type="button"
      class="realisations-details__carousel-action"
      [class.realisations-details__carousel-action--fullscreen]="isFullscreenOpen()"
      (click)="isFullscreenActive() ? closeFullscreen() : openFullscreen()"
      [attr.aria-label]="
        isFullscreenActive()
          ? ('realisations.details.carousel.close-fullscreen' | translate)
          : ('realisations.details.carousel.open-fullscreen' | translate)
      "
    >
      <span aria-hidden="true">{{ isFullscreenActive() ? '⤡' : '⤢' }}</span>
    </button>

    @if (images().length > 1) {
      <a
        class="carousel-control-prev"
        [href]="'#' + carouselId"
        role="button"
        data-slide="prev"
        [attr.data-bs-target]="'#' + carouselId"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="sr-only visually-hidden">Previous</span>
      </a>
      <a
        class="carousel-control-next"
        [href]="'#' + carouselId"
        role="button"
        data-slide="next"
        [attr.data-bs-target]="'#' + carouselId"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
      </a>
    }
  </div>
</div>
@if (images().length > 0) {
  <div class="realisations-details__thumbs" role="list">
    @for (image of images(); track image; let i = $index) {
      <button
        type="button"
        class="realisations-details__thumb"
        [class.realisations-details__thumb--active]="i === activeIndex()"
        (click)="goTo(i)"
        role="listitem"
        [attr.aria-label]="'Slide ' + (i + 1)"
      >
        <img [ngSrc]="image" [alt]="alt()" width="200" height="112" />
      </button>
    }
  </div>
}
