<app-section-header [title]="'offer.title' | translate" [subtitle]="'offer.subtitle' | translate" />

<section class="services">
  @for (service of services(); track service.title) {
    <div class="card fade-in">
      <div class="icon bi bi-{{ service.icon }}"></div>
      <div class="title">{{ service.title }}</div>
    </div>
  }
</section>

@for (section of sections(); track section.title) {
  <section class="offer-section" [attr.aria-label]="section.title">
    <h2>{{ section.title }}</h2>

    @if (section.items?.length) {
      <ul class="offer-section__item">
        @for (item of section.items; track item) {
          <li>{{ item }}</li>
        }
      </ul>
    }

    @if (section.note) {
      <p class="offer-section__note">{{ section.note }}</p>
    }
  </section>
}
