<app-section-header
  [title]="'menu.references' | translate"
  [subtitle]="'references.intro' | translate"
/>
<section aria-labelledby="references-title" class="references-section">
  <div class="references-list" role="list">
    @for (reference of references(); track $index) {
      <button
        class="reference-card reference-card-button fade-in"
        role="listitem"
        type="button"
        aria-haspopup="dialog"
        [attr.aria-label]="'reference.image.expand-aria' | translate"
        (click)="openPopup(reference)"
      >
        <img
          [ngSrc]="'assets/references/' + reference.files[0]"
          class="card-img-top reference-card-image"
          [attr.alt]="'reference.image.alt' | translate"
          width="210"
          height="297"
        />
        <div class="card-body">
          <p class="card-text text-muted mb-0">{{ reference.titleKey | translate }}</p>
        </div>
      </button>
    }
  </div>

  @if (popupReference(); as popup) {
    <app-reference-popup
      [reference]="popup"
      (close)="closePopup()"
      (next)="nextReference()"
      (previous)="prevReference()"
    />
  }
</section>
