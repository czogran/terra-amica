<app-section-header
  [title]="'about-company.title' | translate"
  [subtitle]="'about-company.intro' | translate"
/>
<section class="about-section py-5">
  <div class="container">
    <div class="row g-4 align-items-center">
      <div class="col-lg-6">
        <p class="about-text">
          {{ 'about-company.text' | translate }}
        </p>
      </div>

      <div class="col-lg-6">
        <div class="feature-card" animate.enter="feature-card-animation">
          <div class="icon-circle">♻</div>
          <p>
            {{ 'about-company.feature1' | translate }}
          </p>
        </div>

        <div class="feature-card" animate.enter="feature-card-animation">
          <div class="icon-circle light">🌱</div>
          <p>
            {{ 'about-company.feature2' | translate }}
          </p>
        </div>
      </div>
    </div>
  </div>
  <div class="d-flex justify-content-center mt-4 mb-2 mx-3">
    <div class="about-offer-cta card p-4">
      <p class="about-offer-cta-text mb-3 text-center">
        {{ 'about-company.offer-cta' | translate }}
      </p>
      <div class="text-center">
        <a class="btn btn-primary" [routerLink]="offerLink()">
          {{ 'menu.offer' | translate }}
        </a>
      </div>
    </div>
  </div>
</section>
